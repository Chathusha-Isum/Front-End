<div class="bg-[#0b1120] text-slate-200 font-sans antialiased min-h-screen flex items-center justify-center p-4 md:p-6">
    <div class="w-full max-w-4xl bg-[#141c2b] rounded-3xl shadow-2xl shadow-black/40 border border-white/5 overflow-hidden transition-all duration-200">

        <!-- Header -->
        <div class="bg-gradient-to-br from-[#1e293b] to-[#0f172a] px-6 py-6 md:px-8 md:py-7 border-b border-white/5">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-white tracking-tight flex items-center gap-3">
                        <i class="fas fa-car text-purple-400"></i> Add New Car
                    </h1>
                    <p class="text-slate-400 text-sm mt-1">Fill in the details to list your vehicle</p>
                </div>
                <button (click)="goBack()" class="text-slate-400 hover:text-white transition-colors">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
        </div>

        <!-- Form Body -->
        <div class="px-6 py-8 md:px-8 md:py-8">
            <form (ngSubmit)="onSubmit()" #carForm="ngForm">

                <!-- Car Name & Brand -->
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-car mr-2 text-purple-400"></i>Car Name *</label>
                        <input type="text" class="form-input" [(ngModel)]="carData.name" name="name" required placeholder="e.g. Toyota Camry">
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-tag mr-2 text-purple-400"></i>Brand *</label>
                        <input type="text" class="form-input" [(ngModel)]="carData.brand" name="brand" required placeholder="e.g. Toyota">
                    </div>
                </div>

                <!-- Production Year & Category -->
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-calendar-alt mr-2 text-purple-400"></i>Production Year *</label>
                        <input type="number" class="form-input" [(ngModel)]="carData.productionyear" name="productionyear" required placeholder="e.g. 2020" min="1900" max="2026">
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-layer-group mr-2 text-purple-400"></i>Category *</label>
                        <select class="form-input" [(ngModel)]="carData.category" name="category" required>
                            <option value="">Select Category</option>
                            <option value="Sedan">Sedan</option>
                            <option value="SUV">SUV</option>
                            <option value="Hatchback">Hatchback</option>
                            <option value="Coupe">Coupe</option>
                            <option value="Convertible">Convertible</option>
                            <option value="Truck">Truck</option>
                            <option value="Van">Van</option>
                            <option value="Electric">Electric</option>
                            <option value="Luxury">Luxury</option>
                            <option value="Sports">Sports</option>
                        </select>
                    </div>
                </div>

                <!-- Price & Mileage -->
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-dollar-sign mr-2 text-purple-400"></i>Price (LKR) *</label>
                        <input type="number" class="form-input" [(ngModel)]="carData.price" name="price" required placeholder="e.g. 5500000" step="0.01" min="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-tachometer-alt mr-2 text-purple-400"></i>Mileage (km)</label>
                        <input type="number" class="form-input" [(ngModel)]="carData.mileage" name="mileage" placeholder="e.g. 15000" min="0">
                    </div>
                </div>

                <!-- Color & Fuel Type -->
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-palette mr-2 text-purple-400"></i>Color *</label>
                        <input type="text" class="form-input" [(ngModel)]="carData.color" name="color" required placeholder="e.g. Red, Blue, Black">
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-gas-pump mr-2 text-purple-400"></i>Fuel Type *</label>
                        <select class="form-input" [(ngModel)]="carData.fueltype" name="fueltype" required>
                            <option value="">Select Fuel Type</option>
                            <option value="Petrol">Petrol</option>
                            <option value="Diesel">Diesel</option>
                            <option value="Electric">Electric</option>
                            <option value="Hybrid">Hybrid</option>
                            <option value="CNG">CNG</option>
                            <option value="LPG">LPG</option>
                        </select>
                    </div>
                </div>

                <!-- Horsepower & Engine Capacity -->
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-horse-head mr-2 text-purple-400"></i>Horsepower</label>
                        <input type="number" class="form-input" [(ngModel)]="carData.horsepower" name="horsepower" placeholder="e.g. 180" min="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-microchip mr-2 text-purple-400"></i>Engine Capacity (L)</label>
                        <input type="number" class="form-input" [(ngModel)]="carData.enginecapacity" name="enginecapacity" placeholder="e.g. 2.5" step="0.1" min="0">
                    </div>
                </div>

                <!-- Transmission & Link -->
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-cog mr-2 text-purple-400"></i>Transmission *</label>
                        <select class="form-input" [(ngModel)]="carData.transmission" name="transmission" required>
                            <option value="">Select Transmission</option>
                            <option value="Automatic">Automatic</option>
                            <option value="Manual">Manual</option>
                            <option value="CVT">CVT</option>
                            <option value="Dual-Clutch">Dual-Clutch</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-link mr-2 text-purple-400"></i>Link</label>
                        <input type="text" class="form-input" [(ngModel)]="carData.link" name="link" placeholder="e.g. https://example.com">
                    </div>
                </div>

                <!-- Description -->
                <div class="form-group full-width">
                    <label class="form-label"><i class="fas fa-align-left mr-2 text-purple-400"></i>Description</label>
                    <textarea class="form-input" [(ngModel)]="carData.description" name="description" rows="3" placeholder="Describe your car in detail..."></textarea>
                </div>

                <!-- 3D Model Upload -->
                <div class="form-group full-width">
                    <label class="form-label"><i class="fas fa-cube mr-2 text-purple-400"></i>3D Model</label>
                    <div class="file-input-wrapper">
                        <div class="file-input-label" style="border-color: rgba(139, 92, 246, 0.3);">
                            <i class="fas fa-cube" style="color: #8b5cf6;"></i>
                            <span>{{ modelFileName || 'Click to upload 3D model' }}</span>
                            <span class="text-xs text-slate-500">GLB, GLTF, FBX, OBJ (Max 200MB)</span>
                        </div>
                        <input type="file" (change)="onModelSelected($event)" accept=".glb,.gltf,.fbx,.obj">
                    </div>
                </div>

                <!-- Car Image Upload -->
                <div class="form-group full-width">
                    <label class="form-label"><i class="fas fa-image mr-2 text-purple-400"></i>Car Image</label>
                    <div class="file-input-wrapper">
                        <div class="file-input-label">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <span>{{ imageFileName || 'Click or drag to upload image' }}</span>
                            <span class="text-xs text-slate-500">PNG, JPG, JPEG, WEBP (Max 5MB)</span>
                        </div>
                        <input type="file" (change)="onImageSelected($event)" accept="image/*">
                    </div>
                    <div class="image-preview" *ngIf="imagePreview">
                        <img [src]="imagePreview" alt="Preview">
                    </div>
                </div>

                <!-- Form Actions -->
                <div class="flex flex-wrap gap-4 mt-8 pt-6 border-t border-white/5">
                    <button type="submit" class="btn-submit" [disabled]="!carForm.form.valid || isSubmitting">
                        <i class="fas fa-plus-circle"></i>
                        {{ isSubmitting ? 'Adding...' : 'Add Car' }}
                    </button>
                    <button type="button" class="btn-cancel" (click)="goBack()">
                        <i class="fas fa-times mr-2"></i> Cancel
                    </button>
                </div>

                <!-- Error/Success Message -->
                <div *ngIf="errorMessage" class="mt-4 p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-300 text-sm">
                    <i class="fas fa-exclamation-circle mr-2"></i> {{ errorMessage }}
                </div>
                <div *ngIf="successMessage" class="mt-4 p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl text-emerald-300 text-sm">
                    <i class="fas fa-check-circle mr-2"></i> {{ successMessage }}
                </div>

            </form>
        </div>
    </div>
</div>
