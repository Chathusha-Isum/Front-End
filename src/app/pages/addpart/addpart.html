<div class="bg-[#0b1120] text-slate-200 font-sans antialiased min-h-screen flex items-center justify-center p-4 md:p-6">
    <div class="w-full max-w-4xl bg-[#141c2b] rounded-3xl shadow-2xl shadow-black/40 border border-white/5 overflow-hidden transition-all duration-200">

        <!-- Header -->
        <div class="bg-gradient-to-br from-[#1e293b] to-[#0f172a] px-6 py-6 md:px-8 md:py-7 border-b border-white/5">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-white tracking-tight flex items-center gap-3">
                        <i class="fas fa-cogs text-pink-400"></i> Add New Part
                    </h1>
                    <p class="text-slate-400 text-sm mt-1">Fill in the details to list your car part</p>
                </div>
                <button (click)="goBack()" class="text-slate-400 hover:text-white transition-colors">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
        </div>

        <!-- Form Body -->
        <div class="px-6 py-8 md:px-8 md:py-8">
            <form (ngSubmit)="onSubmit()" #partForm="ngForm">

                <!-- Part Name & Car Compatibility -->
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-cog mr-2 text-pink-400"></i>Part Name *</label>
                        <input type="text" class="form-input" [(ngModel)]="partData.name" name="name" required placeholder="e.g. Brake Pads, Alternator">
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-car mr-2 text-pink-400"></i>Compatible Car *</label>
                        <input type="text" class="form-input" [(ngModel)]="partData.car" name="car" required placeholder="e.g. Toyota Camry 2020">
                    </div>
                </div>

                <!-- Condition & Quantity -->
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-clipboard-check mr-2 text-pink-400"></i>Condition *</label>
                        <select class="form-input" [(ngModel)]="partData.condition" name="condition" required>
                            <option value="">Select Condition</option>
                            <option value="New">New</option>
                            <option value="Like New">Like New</option>
                            <option value="Excellent">Excellent</option>
                            <option value="Good">Good</option>
                            <option value="Fair">Fair</option>
                            <option value="Used">Used</option>
                            <option value="Refurbished">Refurbished</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-boxes mr-2 text-pink-400"></i>Quantity *</label>
                        <input type="number" class="form-input" [(ngModel)]="partData.qty" name="qty" required placeholder="e.g. 5" min="0">
                    </div>
                </div>

                <!-- Price -->
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label class="form-label"><i class="fas fa-dollar-sign mr-2 text-pink-400"></i>Price (LKR) *</label>
                        <input type="number" class="form-input" [(ngModel)]="partData.price" name="price" required placeholder="e.g. 15000" step="0.01" min="0">
                    </div>
                </div>

                <!-- Description -->
                <div class="form-group full-width">
                    <label class="form-label"><i class="fas fa-align-left mr-2 text-pink-400"></i>Description</label>
                    <textarea class="form-input" [(ngModel)]="partData.description" name="description" rows="3" placeholder="Describe the part in detail..."></textarea>
                </div>

                <!-- Image Upload -->
                <div class="form-group full-width">
                    <label class="form-label"><i class="fas fa-image mr-2 text-pink-400"></i>Part Image</label>
                    <div class="file-input-wrapper">
                        <div class="file-input-label">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <span>{{ imageFileName || 'Click or drag to upload image' }}</span>
                            <span class="text-xs text-slate-500">PNG, JPG, JPEG, WEBP (Max 5MB)</span>
                        </div>
                        <input type="file" (change)="onImageSelected($event)" accept="image/*">
                    </div>
                    <div class="image-preview" *ngIf="imagePreview">
                        <img [src]="imagePreview" alt="Preview">
                    </div>
                </div>

                <!-- Form Actions -->
                <div class="flex flex-wrap gap-4 mt-8 pt-6 border-t border-white/5">
                    <button type="submit" class="btn-submit" [disabled]="!partForm.form.valid || isSubmitting">
                        <i class="fas fa-plus-circle"></i>
                        {{ isSubmitting ? 'Adding...' : 'Add Part' }}
                    </button>
                    <button type="button" class="btn-cancel" (click)="goBack()">
                        <i class="fas fa-times mr-2"></i> Cancel
                    </button>
                </div>

                <!-- Error/Success Message -->
                <div *ngIf="errorMessage" class="mt-4 p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-300 text-sm">
                    <i class="fas fa-exclamation-circle mr-2"></i> {{ errorMessage }}
                </div>
                <div *ngIf="successMessage" class="mt-4 p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl text-emerald-300 text-sm">
                    <i class="fas fa-check-circle mr-2"></i> {{ successMessage }}
                </div>

            </form>
        </div>
    </div>
</div>
