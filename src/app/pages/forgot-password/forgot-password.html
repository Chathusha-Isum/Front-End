<!-- Reset Password Card - Dark Theme (matching login page) -->
<div class="max-w-md w-full bg-[#13131a] rounded-2xl shadow-2xl overflow-hidden justify-center mx-auto mt-10 border border-[#2a2a35]">
    <!-- Header -->
    <div class="bg-gradient-to-r from-blue-900/80 via-blue-800/70 to-indigo-900/80 px-6 py-8 border-b border-blue-700/30">
        <div class="text-center">
            <div class="mx-auto w-16 h-16 bg-white/10 backdrop-blur-sm rounded-full flex items-center justify-center mb-4 border border-white/10">
                <svg class="w-8 h-8 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                    </path>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white">Reset Password</h2>
            <p class="text-blue-200/80 mt-2 text-sm">Create your new password</p>
        </div>
    </div>

    <!-- Form Body -->
    <div class="px-6 py-8">
        <form id="resetPasswordForm">
            <!-- New Password Input -->
            <div class="mb-6">
                <label for="newPassword" class="block text-gray-300 text-sm font-semibold mb-2">
                    New Password
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                            </path>
                        </svg>
                    </div>
                    <input 
                        type="password" 
                        id="newPassword" 
                        name="newPassword" 
                        required
                        class="w-full pl-10 pr-4 py-3 bg-[#1c1c24] border border-[#2a2a35] rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition duration-200 text-white placeholder-gray-500"
                        placeholder="Enter new password" 
                        [(ngModel)] = "newPassword" >
                </div>
                <p class="text-xs text-gray-400 mt-1">Password must be at least 8 characters</p>
            </div>

            <!-- Confirm Password Input -->
            <div class="mb-6">
                <label for="confirmPassword" class="block text-gray-300 text-sm font-semibold mb-2">
                    Confirm Password
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                            </path>
                        </svg>
                    </div>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword"
                        [(ngModel)] = "confirmPassword" 
                        required
                        class="w-full pl-10 pr-4 py-3 bg-[#1c1c24] border border-[#2a2a35] rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition duration-200 text-white placeholder-gray-500"
                        placeholder="Confirm your new password">
                </div>
            </div>

            <!-- Submit Button -->
            <button 
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition duration-200 transform hover:scale-[1.02] focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-[#13131a]" 
                (click)="reset()">
                Reset Password
            </button>

            <!-- Back to Login Link -->
            <div class="mt-6 text-center">
                <a href="login"
                    class="text-sm text-blue-400 hover:text-blue-300 font-medium transition duration-200 inline-flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Back to Login
                </a>
            </div>
        </form>
    </div>

    <!-- Footer Note -->
    <div class="px-6 py-4 bg-[#0f0f16] border-t border-[#22222b]">
        <p class="text-xs text-gray-400 text-center">
            Make sure your new password is secure
        </p>
    </div>
</div>
