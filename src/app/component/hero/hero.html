<div class="main-container">
    
    <!-- Header -->
    <div class="text-center z-10">
        <h1 class="text-4xl md:text-5xl font-bold text-white mb-3">Cruiser Premium</h1>
        <img src="img/logo.png" alt="Cruiser Premium" class="logo">
    </div>

    <!-- Button Row - PERFECTLY CENTERED CARS -->
    <div class="button-row">
        
        <!-- Hatch Back -->
        <div class="depth-btn" data-pos="0" data-category="Hatch Back" data-image="3-2.png">
            <a class="image-container">
                <img src="img/3-2.png" alt="Hatch Back" class="car-image">
            </a>
        </div>

        <!-- Super Car -->
        <div class="depth-btn" data-pos="1" data-category="Super Car" data-image="2-2.png">
            <div class="image-container">
                <img src="img/2-2.png" alt="Super Car" class="car-image">
            </div>
        </div>

        <!-- SUV (Center) -->
        <div class="depth-btn" data-pos="2" data-category="SUV" data-image="1.png">
            <a class="image-container" href="upload">
                <img src="img/1.png" alt="SUV" class="car-image">
            </a>
        </div>

        <!-- Sedan -->
        <div class="depth-btn" data-pos="3" data-category="Sedan" data-image="2-1.png">
            <div class="image-container">
                <img src="img/2-1.png" alt="Sedan" class="car-image">
            </div>
        </div>

        <!-- Cab -->
        <div class="depth-btn" data-pos="4" data-category="Cab" data-image="3-1.png">
            <div class="image-container">
                <img src="img/3-1.png" alt="Cab" class="car-image">
            </div>
        </div>
    </div>
</div>
